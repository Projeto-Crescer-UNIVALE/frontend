<header class="app-header">
  <div class="header-content">
    <div class="header-logo">
      <img src="assets/logo-projeto-crescer.svg" alt="Logo Projeto Crescer" class="logo-img" />
      <div class="logo-text">
        <strong>PROJETO CRESCER</strong>
        <span>Educando e compartilhando amor</span>
      </div>
    </div>

    <nav class="header-nav">
      <ul>
        <li>
          <a routerLink="/painel" routerLinkActive="active">Painel</a>
        </li>
        <li>
          <a routerLink="/alunos" routerLinkActive="active">Alunos</a>
        </li>
        <li>
          <a routerLink="/usuarios" routerLinkActive="active">Usuários</a>
        </li>
        <li>
          <a routerLink="/oficinas" routerLinkActive="active">Oficinas</a>
        </li>
      </ul>
    </nav>

    <div class="header-user">
      <button (click)="toggleDropdown()" class="avatar-button">
        <img 
          [src]="'https://ui-avatars.com/api/?name=' + userName + '&background=f0f0f0&color=333&rounded=true&size=40'" 
          [alt]="'Avatar de ' + userName" 
          class="user-avatar"
        />
      </button>

      <div *ngIf="dropdownOpen" class="user-dropdown">
        <button (click)="logout()" class="logout-button">
          Encerrar Sessão
        </button>
      </div>
    </div>
  </div>
</header>
