<div class="container-oficina">
  <h1>Lista de Oficinas</h1>
  <app-tabela
    [colunas]="colunas"
    endpoint="oficina"
    campoIdentificador="id_oficina"
    (acaoSecundaria)="deletarOficina($event)"
  >
    <button class="btn-primary btn-new" routerLink="novo">
      + Cadastrar nova oficina
    </button>
  </app-tabela>
</div>
