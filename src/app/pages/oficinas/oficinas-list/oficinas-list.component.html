<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300&display=swap" />

<div class="container-oficina">
  <h1>Lista de Oficinas</h1>

  <!-- Card de busca -->
  <div class="search-card">
    <div class="search-row">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Digite sua pesquisa..." [(ngModel)]="termo" />
      </div>
      <button class="btn-salvar" (click)="pesquisar()">Pesquisar</button>
    </div>
  </div>

  <button class="btn-salvar btn-new" routerLink="/oficinas/novo">＋ Cadastrar nova oficina</button>

  <div class="table-wrap">
    <table class="table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Professor</th>
          <th>Dias da Semana</th>
          <th>Horário</th>
          <th style="width:180px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of listaFiltrada; let i = index" [class.zebra]="i % 2 === 1">
          <td>{{ o.nome }}</td>
          <td>{{ o.professor }}</td>
          <td>{{ o.dias }}</td>
          <td>{{ o.horario }}</td>
          <td class="actions">
            <a class="btn btn-view" [routerLink]="['/oficinas/editar', o.id]">Visualizar</a>
            <button class="btn btn-danger" (click)="deletar(o.id)">Deletar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
