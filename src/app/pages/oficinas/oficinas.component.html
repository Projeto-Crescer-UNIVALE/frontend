<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300&display=swap" />


<div class="container-oficina">
  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="#">Oficinas</a>
    <span>&gt;</span>
    <span class="current">Adicionar nova oficina</span>
  </nav>

  <h1>Adicionar nova oficina</h1>

  <form>
  <h2>Informações básicas</h2>
  <div class="form-grid">
    <div>
      <label for="nome">Nome da oficina</label>
      <input type="text" id="nome" placeholder="Digite o nome" />
    </div>

   <div class="form-group">
        <label for="professor">Professor</label>
        <select id="professor">
          <option value="">Selecione uma opção</option>
          <option value="1">Professor 1</option>
          <option value="2">Professor 2</option>
        </select>
      </div>
    </div>

   <div class="dias-semana">
      <label>Dias da semana</label>
      <div class="checkbox-group">
        <label><input type="checkbox" /> Domingo</label>
        <div class="horarios">
          <input type="time" placeholder="Início" /><span>até</span><input type="time" placeholder="Fim" />
        </div>
      </div>

    <label><input type="checkbox" /> Segunda-feira</label>
    <label><input type="checkbox" /> Terça-feira</label>
    <label><input type="checkbox" /> Quarta-feira</label>
    <label><input type="checkbox" /> Quinta-feira</label>
    <label><input type="checkbox" /> Sexta-feira</label>
    <label><input type="checkbox" /> Sábado</label>
  </div>

  <button class="btn-salvar">Adicionar nova oficina</button>
  </form>
</div>
