<div class="container-oficina">
  <nav class="breadcrumb">
    <a href="#">Oficinas</a>
    <span>&gt;</span>
    <span class="current">{{ titulo }}</span>
  </nav>
  <h1>{{ titulo }}</h1>

  <h2>Informações básicas</h2>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="form-grid-duplo">
      <div class="campo">
        <label for="nome">Nome da oficina</label>
        <input id="nome" type="text" formControlName="nome" />
        <div
          class="form-note erro"
          *ngIf="form.get('nome')?.touched && form.get('nome')?.invalid"
        >
          O nome da oficina está invalido.
        </div>
      </div>

      <div class="campo">
        <label for="professor">Professor</label>
        <select
          id="professor"
          formControlName="id_funcionario"
          class="select-professor"
        >
          <option value="">Selecione um professor</option>
          <option *ngFor="let p of professores" [value]="p.id_funcionario">
            {{ p.nome }}
          </option>
        </select>
        <div
          class="form-note erro"
          *ngIf="
            form.get('id_funcionario')?.touched &&
            form.get('professor')?.invalid
          "
        >
          Selecione um professor.
        </div>
      </div>
    </div>

    <div class="campo">
      <label for="descricao">Descrição da oficina</label>
      <textarea id="descricao" formControlName="descricao" rows="4"></textarea>
      <div
        class="form-note erro"
        *ngIf="form.get('descricao')?.touched && form.get('descricao')?.invalid"
      >
        A descrição da oficina é obrigatória.
      </div>
    </div>

    <div class="dias-semana" formArrayName="cronograma">
      @for (dia of dias; track $index) {

      <div class="dia">
        <input
          type="checkbox"
          [id]="$index + 1"
          name="chk-{{ $index + 1 }}"
          [checked]="cronogramaDiaExists($index + 1)"
          (change)="handleToggleCronograma($index + 1, $event)"
        />
        <label [for]="$index + 1">{{ dia.nome }}</label>

        @let cronogramaIndex = getCronogramaIndex($index + 1); @if
        (cronogramaIndex !== -1) {

        <div class="horarios" [formGroupName]="cronogramaIndex">
          <div>
            <label>Hora de início</label><br />
            <input type="time" formControlName="hora_inicio" />
          </div>
          <div>
            <label>Hora de fim</label><br />
            <input type="time" formControlName="hora_fim" />
          </div>
        </div>
        }
      </div>
      }
    </div>

    <button class="btn-salvar" type="submit">
      {{ id ? "Salvar alterações" : "Adicionar nova oficina" }}
    </button>
    <button class="btn-cancelar" type="button" (click)="cancelar()">
      Cancelar
    </button>
  </form>
</div>
