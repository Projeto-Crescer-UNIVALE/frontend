<div class="auth-card">
  <h2>Acesso</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div *ngIf="errorMessage()" class="error-msg" style="margin-bottom: 16px; padding: 12px; background-color: #fdd; border: 1px solid #c62828; border-radius: 4px; color: #c62828;">
      {{ errorMessage() }}
    </div>

    <label class="label" for="email">E-mail</label>
    <input
      class="input"
      id="email"
      type="email"
      placeholder="meu@email.com.br"
      formControlName="email"
      [ngClass]="{'invalid-input': f.email.invalid && (f.email.dirty || f.email.touched)}"
    />
    <div *ngIf="f.email.invalid && (f.email.dirty || f.email.touched)" class="error-msg">
      <div *ngIf="f.email.errors?.['required']">E-mail é obrigatório.</div>
      <div *ngIf="f.email.errors?.['email']">Por favor, insira um e-mail válido.</div>
    </div>

    <label class="label" for="password" style="margin-top:10px">Senha</label>
    <input
      class="input"
      id="password"
      type="password"
      placeholder="************"
      formControlName="password"
      [ngClass]="{'invalid-input': f.password.invalid && (f.password.dirty || f.password.touched)}"
    />
    <div *ngIf="f.password.invalid && (f.password.dirty || f.password.touched)" class="error-msg">
      <div *ngIf="f.password.errors?.['required']">Senha é obrigatória.</div>
      <div *ngIf="f.password.errors?.['minlength']">
        A senha deve ter no mínimo 6 caracteres.
      </div>
    </div>

    <div class="help"><a routerLink="/auth/forgot-password" style="font-weight: 500;">Esqueceu sua senha?</a></div>
    <button class="btn" type="submit" [disabled]="form.invalid || loading()">ENTRAR</button>
  </form>
</div>
