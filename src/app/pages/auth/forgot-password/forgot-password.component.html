<div class="auth-center">
  <img src="assets/images/logo.svg" alt="Projeto Crescer" class="logo">

  <div class="auth-card">
    <h2>Esqueci minha senha</h2>
    <p class="subtle">Por favor insira seu e-mail e enviaremos um link para redefinir sua senha.</p>

    <form (submit)="onSubmit($event)">
      <label class="label" for="fp-email">E-mail</label>
      <input
        id="fp-email"
        class="input"
        type="email"
        placeholder="meu@email.com.br"
        [(ngModel)]="email"
        name="email"
        (blur)="emailTouched = true"
        [class.invalid-input]="emailTouched && !isEmailValid"
      />
      <!-- Error Message for Email -->
      <div *ngIf="emailTouched && emailErrorMsg" class="error-msg">
        {{ emailErrorMsg }}
      </div>

      <button
        type="submit"
        class="btn"
        style="margin-top:12px"
        [disabled]="!isEmailValid"
      >
        REDEFINIR SENHA
      </button>
    </form>

    <div class="help" style="margin-top:10px">
      <a routerLink="/login">Voltar para login</a>
    </div>
  </div>
</div>
