<div class="container-usuario">
  <nav class="breadcrumb">
    <a href="#">Usuários</a>
    <span>&gt;</span>
    <span class="current">{{ titulo }}</span>
  </nav>

  <h1>{{ titulo }}</h1>

  <h2>Informações básicas</h2>

  <form [formGroup]="form" (ngSubmit)="salvar()">
    <div class="form-grid-duplo">
      <div class="campo">
        <label for="nome">Nome completo</label>
        <input id="nome" type="text" formControlName="nome" />
      </div>

      <div class="campo">
        <label for="telefone">Telefone</label>
        <input id="telefone" type="text" formControlName="telefone" />
      </div>
    </div>

    <div class="form-grid-duplo">
      <div class="campo">
        <label for="email">E-mail</label>
        <input id="email" type="text" formControlName="email" />
      </div>
    </div>

    <div class="form-grid-duplo">
      <div class="campo">
        <label>Tipo de usuário</label>
        <label><input type="radio" formControlName="tipo" value="Administrador" /> Administrador</label>
        <label><input type="radio" formControlName="tipo" value="Professor" /> Professor</label>
      </div>

      <div class="campo">
        <label>Status</label>
        <label><input type="radio" formControlName="status" value="Ativo" /> Ativo</label>
        <label><input type="radio" formControlName="status" value="Inativo" /> Inativo</label>
      </div>
    </div>

    <button class="btn-salvar" type="submit">
      {{ id ? 'Salvar alterações' : 'Adicionar novo usuário' }}
    </button>
    <button class="btn-cancelar" type="button" (click)="cancelar()">Cancelar</button>
  </form>
</div>
